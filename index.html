<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server PvP Tier List</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffaa00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 30px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        .tier-row {
            display: flex;
            align-items: center;
            background-color: #1a1a1a;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d2d2d;
        }
        .tier-label {
            width: 120px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 20px 0;
            color: #000;
            text-transform: uppercase;
        }
        /* Tier Colors */
        .s-tier { background-color: #ff7f7f; }
        .a-tier { background-color: #ffbf7f; }
        .b-tier { background-color: #ffff7f; }
        .c-tier { background-color: #7fff7f; }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            padding: 10px 20px;
            gap: 15px;
        }
        .player-card {
            background-color: #262626;
            padding: 8px 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #3d3d3d;
            transition: transform 0.2s;
        }
        .player-card:hover {
            transform: scale(1.05);
            border-color: #ffaa00;
        }
        .player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            image-rendering: pixelated;
        }
        .player-name {
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Thunder PvP Tier List</h1>
    <input type="text" id="search" class="search-box" placeholder="Search player IGN...">

    <!-- S TIER -->
    <div class="tier-row">
        <div class="tier-label s-tier">S Tier</div>
        <div class="player-list" id="S"></div>
    </div>

    <!-- A TIER -->
    <div class="tier-row">
        <div class="tier-label a-tier">A Tier</div>
        <div class="player-list" id="A"></div>
    </div>

    <!-- B TIER -->
    <div class="tier-row">
        <div class="tier-label b-tier">B Tier</div>
        <div class="player-list" id="B"></div>
    </div>

    <!-- C TIER -->
    <div class="tier-row">
        <div class="tier-label c-tier">C Tier</div>
        <div class="player-list" id="C"></div>
    </div>
</div>

<script>
    // Data Database (Yahan tum apne players ka data change kar sakte ho)
    const players = [
        { name: "PlayerOne", tier: "S" },
        { name: "ProPvper", tier: "S" },
        { name: "Chrono", tier: "A" },
        { name: "X_HackerKiller_X", tier: "A" },
        { name: "Steve_Builds", tier: "B" },
        { name: "AlexPvP", tier: "B" },
        { name: "NoobMaster", tier: "C" }
    ];

    function renderPlayers(filter = "") {
        // Clear old list
        document.querySelectorAll('.player-list').forEach(el => el.innerHTML = "");

        players.forEach(p => {
            if (p.name.toLowerCase().includes(filter.toLowerCase())) {
                const container = document.getElementById(p.tier);
                if (container) {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    
                    // Minotar API se automatic player skin avatar nikalna
                    card.innerHTML = `
                        <img class="player-avatar" src="https://minotar.net/avatar/${p.name}/32" alt="${p.name}">
                        <span class="player-name">${p.name}</span>
                    `;
                    container.appendChild(card);
                }
            }
        });
    }

    // Search Feature
    document.getElementById('search').addEventListener('input', (e) => {
        renderPlayers(e.target.value);
    });

    // Initial Load
    renderPlayers();
</script>

</body>
</html>
